<!DOCTYPE html>
<html style="margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%;">
<body style="margin:0; padding:0; background:#000; width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
    <!-- Этот плеер спрятан внутри iframe, имеет автозапуск и зацикливание -->
    <video src="re7.mp4" id="v" controls autoplay muted loop style="width:100%; height:100%; object-fit:contain; background:#000;"></video>
    <script>
        // Жесткий пинок автозапуска, который срабатывает внутри изолированного iframe
        window.addEventListener('DOMContentLoaded', () => {
            const v = document.getElementById('v');
            if (v) {
                v.muted = true;
                v.play().catch(() => {
                    // План Б: если браузер совсем параноик, видео стартанет при первом шевелении мышки внутри плеера
                    window.addEventListener('mouseover', () => { v.play(); }, { once: true });
                });
            }
        });
    </script>
</body>
</html>
